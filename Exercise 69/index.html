<html>
    <head>
        <title>Employee by Title</title>
        <script src="js/mainjs.js"></script>
        <style>
            @import url(css/maincss.css);
        </style>
    </head>
    <body>
        <table id="tb1title" border="1">
            <tr>
                <td>Title:</td>
                <td><select id="drptitle" onchange="display_employee_bytitle(drptitle,bodyemployee)">
                    <option value="">Select Title</option>
                </select></td>
            </tr>
        </table>
        <br><br>
        <table id="tb2employee" border="1">
            <thead>
                <tr>
                    <th>Employee ID</th>
                    <th>Employee Name</th>
                    <th>Phone</th>
                </tr>
            </thead>
            <tbody id="bodyemployee">

            </tbody>
        </table>
        <script>
            var dataset_path="employees.xml"
            var drptitle=document.getElementById("drptitle")
            var bodyemployee=document.getElementById("bodyemployee")
            load_employee_fromxml(dataset_path,drptitle,bodyemployee)
        </script>
    </body>
</html>
